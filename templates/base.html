<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VoiceFlow - AI Speech Analysis</title>
    <link rel="stylesheet" href="/static/css/style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
</head>

<body>
    <nav>
        <div style="font-size: 1.5rem; font-weight: 800; color: var(--primary);">VoiceFlow AI</div>
        <div style="display: flex; gap: 2rem; align-items: center;">
            {% if user.is_authenticated %}
            <a href="{% url 'dashboard' %}" style="color: var(--text-main); text-decoration: none;">Dashboard</a>
            <a href="{% url 'upload' %}" style="color: var(--text-main); text-decoration: none;">Record</a>
            <a href="{% url 'logout' %}"
                style="color: var(--text-muted); text-decoration: none; font-size: 0.875rem;">Logout</a>
            {% else %}
            <a href="{% url 'login' %}" style="color: var(--text-main); text-decoration: none;">Login</a>
            <a href="{% url 'signup' %}" class="btn-primary" style="text-decoration: none;">Join Free</a>
            {% endif %}
        </div>
    </nav>

    <div class="container">
        {% block content %}{% endblock %}
    </div>

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    {% block scripts %}{% endblock %}
</body>

</html>
