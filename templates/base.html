<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}VoiceFlow - AI Speech Analysis{% endblock %}</title>
    <link rel="stylesheet" href="/static/css/style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&family=Inter:wght@400;600&display=swap"
        rel="stylesheet">
    <style>
        body {
            font-family: 'Outfit', 'Inter', sans-serif;
        }
    </style>
    {% block head %}{% endblock %}
</head>

<body>
    <nav>
        <div class="logo-container">
            <a href="/" style="text-decoration: none; display: flex; align-items: center; gap: 0.5rem;">
                <div
                    style="width: 32px; height: 32px; background: linear-gradient(135deg, var(--primary), var(--secondary)); border-radius: 8px; display: grid; place-items: center;">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5"
                        stroke-linecap="round" stroke-linejoin="round">
                        <path d="M12 2a3 3 0 0 0-3 3v7a3 3 0 0 0 6 0V5a3 3 0 0 0-3-3Z" />
                        <path d="M19 10v2a7 7 0 0 1-14 0v-2" />
                        <line x1="12" x2="12" y1="19" y2="22" />
                    </svg>
                </div>
                <span style="font-size: 1.5rem; font-weight: 800; color: white; letter-spacing: -0.02em;">Voice<span
                        class="gradient-text">Flow</span></span>
            </a>
        </div>

        <div style="display: flex; gap: 2rem; align-items: center;">
            {% if user.is_authenticated %}
            <a href="{% url 'dashboard' %}"
                style="color: var(--text-main); text-decoration: none; font-weight: 600; font-size: 0.95rem;">Dashboard</a>
            <a href="{% url 'upload' %}"
                style="color: var(--text-main); text-decoration: none; font-weight: 600; font-size: 0.95rem;">Record</a>
            <div style="width: 1px; height: 20px; background: var(--glass-border);"></div>
            <a href="{% url 'logout' %}"
                style="color: var(--text-muted); text-decoration: none; font-size: 0.9rem; transition: var(--transition);"
                onmouseover="this.style.color='var(--accent)'"
                onmouseout="this.style.color='var(--text-muted)'">Logout</a>
            {% else %}
            <a href="{% url 'login' %}"
                style="color: var(--text-main); text-decoration: none; font-weight: 600;">Login</a>
            <a href="{% url 'signup' %}" class="btn-primary" style="padding: 0.6rem 1.25rem; font-size: 0.9rem;">Get
                Started</a>
            {% endif %}
        </div>
    </nav>

    <main class="container">
        {% block content %}{% endblock %}
    </main>

    <footer>
        <p>&copy; 2026 VoiceFlow AI. All rights reserved.</p>
        <div style="margin-top: 1rem; display: flex; justify-content: center; gap: 2rem;">
            <a href="#" style="color: var(--text-dim); text-decoration: none;">Privacy</a>
            <a href="#" style="color: var(--text-dim); text-decoration: none;">Terms</a>
            <a href="#" style="color: var(--text-dim); text-decoration: none;">Support</a>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    {% block scripts %}{% endblock %}
</body>

</html>
